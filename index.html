<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGRH - Connexion</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { 
    display: flex; align-items: center; justify-content: center; 
    min-height: 100vh; background: var(--bg); 
  }
  .login-card {
    background: var(--bg-card); border-radius: var(--radius); 
    padding: 48px 40px; box-shadow: var(--shadow-lg); 
    width: 100%; max-width: 400px; text-align: center;
  }
  .login-logo { width: 160px; margin: 0 auto 8px; border-radius: 8px; }
  .login-title { 
    font-family: Georgia, 'Times New Roman', serif; 
    font-size: 22px; font-weight: 700; margin-bottom: 4px; color: var(--text);
  }
  .login-sub { font-size: 12px; color: var(--text-light); margin-bottom: 32px; }
  .login-form { display: flex; flex-direction: column; gap: 16px; text-align: left; }
  .login-form label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; display: block; }
  .login-form input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-family: inherit; font-size: 14px;
    background: var(--bg); transition: border-color 0.2s;
  }
  .login-form input:focus { outline: none; border-color: var(--accent); }
  .login-error {
    background: #fef2f2; color: var(--danger); padding: 10px 14px;
    border-radius: var(--radius-sm); font-size: 13px; display: none;
  }
  .login-btn {
    width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
    background: var(--accent); color: #fff; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    margin-top: 8px;
  }
  .login-btn:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: var(--shadow); }
  .login-footer { margin-top: 24px; font-size: 11px; color: var(--text-light); }
</style>
</head>
<body>

<div class="login-card">
  <img src="assets/logo.jpg" alt="MGRH" class="login-logo" onerror="this.style.display='none'">
  <div class="login-title">MGRH Grand Ouest</div>
  <div class="login-sub">Gestion Adhérents & Événements</div>

  <form class="login-form" id="loginForm" onsubmit="return handleLogin(event)">
    <div>
      <label for="username">Identifiant</label>
      <input type="text" id="username" autocomplete="username" required autofocus>
    </div>
    <div>
      <label for="password">Mot de passe</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <div class="login-error" id="loginError">Identifiant ou mot de passe incorrect.</div>
    <button type="submit" class="login-btn">Se connecter</button>
  </form>

  <div class="login-footer">Accès réservé aux administrateurs MGRH</div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
